<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>kennedi [home]</title>
<link rel="icon" type="image/x-icon" href="images/tablogo.ico">

<style>

    font-family: Verdana, sans-serif;

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:'Oswald', sans-serif;
    height:100vh;
    color:white;

    cursor:url("images/cursor.webp") 32 32, auto;
}

/* =========================================
   BACKGROUND
========================================= */

.bg{
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.88)),
    url("");

    background-size:cover;
    background-position:center;

    filter:
    grayscale(100%)
    contrast(120%);

    animation:bgMove 12s ease-in-out infinite alternate;

    transform:scale(1.05);
}

@keyframes bgMove{

    from{
        transform:
        scale(1.05)
        translateX(-10px);
    }

    to{
        transform:
        scale(1.1)
        translateX(10px);
    }

}

/* =========================================
   NOISE / VIGNETTE
========================================= */

.noise{
    position:fixed;
    inset:0;

    background:
    url("images/bg1.gif");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    opacity:.;

    mix-blend-mode:screen;

    pointer-events:none;
}

.vignette{
    position:fixed;
    inset:0;

    box-shadow:
    inset 0 0 220px rgba(0,0,0,.98);

    pointer-events:none;
}

/* =========================================
   WELCOME SCREEN
========================================= */

#welcomeScreen{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    rgba(0,0,0,.92);

    z-index:99999;

    transition:1s;
}

.welcomeBox{

    width:300px;
    max-width:90%;

    text-align:center;

    padding:40px;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    rgba(0,0,0,.45);

    backdrop-filter:blur(6px);

    animation:flicker 5s infinite;
}

.welcomeBox h1{

    font-size:3rem;
    font-weight:300;

    letter-spacing:8px;

    margin-bottom:15px;

    color:#fff;

    text-shadow:
    0 0 10px rgba(255,255,255,.2);
}

.welcomeBox p{
    color:#888;
    margin-bottom:25px;
    letter-spacing:2px;
}

#enterBtn{

    border:none;

    background:#111;

    color:#ddd;

    padding:14px 30px;

    font-family:'Oswald', sans-serif;

    letter-spacing:3px;

    cursor:pointer;

    transition:.25s;
}

#enterBtn:hover{

    background:
    linear-gradient(135deg,#ED64F5,#7c4dff);
    color:#000;

    box-shadow:
    0 0 15px rgba(255,255,255,.35);

}

.welcomeExit{

    animation:
    zoomForward 1.2s forwards;
}

@keyframes zoomForward{

    0%{
        opacity:1;
        transform:scale(1);
        filter:blur(0px);
    }

    100%{
        opacity:0;
        transform:scale(2.2);
        filter:blur(12px);
    }

}

.welcomeFade{
    opacity:0;
    pointer-events:none;
}

/* =========================================
   MENU
========================================= */

.container{

    position:absolute;

    left:7%;
    top:50%;

    transform:
    translateY(-50%);

    z-index:10;

    opacity:0;

    transition:1.2s ease;
}

.title{
    user-select: none;

    font-size:5rem;
    font-weight:300;

    letter-spacing:12px;

    margin-bottom:40px;

    color:#fceaff;

    animation:flicker 4s infinite;
}

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:.45;
    }

}

.sidebar ul{
list-style:none;
user-select:none;
}

.sidebar li{
margin:20px 0;
}

.sidebar a{
position:relative;
display:inline-block;
text-decoration:none;
color:#8f8f8f;
font-size:1.7rem;
letter-spacing:4px;
transition:.15s;
will-change:transform,filter;
}

.sidebar a::before{
content:'';
position:absolute;
inset:-4px -10px;
background:rgba(255,255,255,.06);
filter:blur(8px);
opacity:0;
pointer-events:none;
transition:.15s;
}

.sidebar a:hover{
color:#fff;
text-shadow:
0 0 4px rgba(255,255,255,.8),
0 0 12px rgba(255,255,255,.25);

animation:motionBlurFast .22s linear infinite;
}

.sidebar a:hover::before{
opacity:1;
animation:bgPulseFast .35s ease-in-out infinite alternate;
}

@keyframes motionBlurFast{
0%{
transform:translateX(0);
filter:blur(.2px);
}

20%{
transform:translateX(.3px);
filter:blur(.8px);
}

40%{
transform:translateX(-.3px);
filter:blur(.3px);
}

60%{
transform:translateX(.4px);
filter:blur(1px);
}

80%{
transform:translateX(-.2px);
filter:blur(.4px);
}

100%{
transform:translateX(0);
filter:blur(.2px);
}
}

@keyframes bgPulseFast{
0%{
filter:blur(6px);
opacity:.12;
}

100%{
filter:blur(14px);
opacity:.22;
}
}
/* =========================================
   MOBILE
========================================= */

@media(max-width:700px){

    .title{
        font-size:3rem;
    }

    .sidebar a{
        font-size:1.2rem;
    }

}

<!-- =========================================
     SPINNING SYMBOL
========================================= -->

    .logo-container {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

.logo {
    animation: spin 90s linear infinite;
    opacity: 0.100;
    filter: brightness(0.9);
}

    /* Optional ambient ring */
    .logo-container::before {
        content: "";
        position: absolute;
        inset: -30px;
        border-radius: 50%;
        background:
            radial-gradient(circle,
                rgba(255,255,255,0.04),
                transparent 70%);
        z-index: -1;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }


</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="bg"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="flash"></div>

<!-- =========================================
     WELCOME SCREEN
========================================= -->

<div id="welcomeScreen">

    <div class="welcomeBox" id="enterBox">

        <p>
            kennedicotarelo.com
        </p>

        <button id="enterBtn">
            get psyched
        </button>

    </div>

</div>

<!-- =========================================
     MENU
========================================= -->

<div class="container">

    <div class="title">
        kennedi
    </div>

    <aside class="sidebar">

        <ul>

            <li>
                <a class="soundLink1"
                href="games.html">
                games
                </a>
            </li>

            <li>
                <a class="soundLink1"
                href="mods.html">
                mods
                </a>
            </li>

            <li>
                <a class="soundLink1"
                href="software.html">
                software
                </a>
            </li>

            <li>
                <a class="soundLink1"
                href="articles.html">
                articles
                </a>
            </li>

            <li>
                <a class="soundLink1"
                href="gallery.html">
                gallery
                </a>
            </li>

            <li>
                <a class="soundLink1"
                href="about.html">
                about
                </a>
            </li>

        </ul>

    </aside>

</div>
<div class="logo-container">
    <img src="images/halospin.png" alt="Logo" class="logo">
</div>

<!-- AUDIO -->

<audio id="bgMusic" loop></audio>

<audio id="sound"
src="buttonsound/bloodlines.mp3">
</audio>

<audio id="sound1"
src="buttonsound/hill.mp3">
</audio>

<script>

/* =========================================
   WELCOME SCREEN
========================================= */

const welcomeScreen =
document.getElementById("welcomeScreen");

const enterBox =
document.getElementById("enterBox");

const enterBtn =
document.getElementById("enterBtn");

const container =
document.querySelector(".container");

enterBtn.addEventListener("click",()=>{

    const sound =
    document.getElementById("sound");

    sound.volume = 0.7;

    sound.currentTime = 0;

    sound.play().catch(()=>{});

    enterBox.classList.add("welcomeExit");

    setTimeout(()=>{

        welcomeScreen.classList.add("welcomeFade");

        container.style.opacity = "1";

    },850);

    setTimeout(()=>{

        welcomeScreen.remove();

    },1800);

});

/* =========================================
   RANDOM BACKGROUND
========================================= */

const gifs = [
];

let gif =
sessionStorage.getItem("bgGif");

if (!gif) {

    gif =
    gifs[Math.floor(Math.random() * gifs.length)];

    sessionStorage.setItem("bgGif", gif);
}

document.querySelector(".bg").style.backgroundImage =
`linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.88)), url('${gif}')`;

/* =========================================
   BG MUSIC
========================================= */

const audio =
document.getElementById("bgMusic");

const songs = [

"bgmusic/menu.mp3"

];

function shuffle(arr){

    for(let i = arr.length - 1; i > 0; i--){

        const j =
        Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] =
        [arr[j], arr[i]];
    }

    return arr;
}

const playlist =
shuffle([...songs]).slice(0,3);

let current = 0;

function fadeInAudio(audio,duration=3000){

    audio.volume = 0;

    audio.play().catch(()=>{});

    const step = 0.05;
    const interval = duration * step;

    const fade = setInterval(()=>{

        if(audio.volume < 1){

            audio.volume =
            Math.min(audio.volume + step,1);

        }else{

            clearInterval(fade);

        }

    },interval);

}

function playSong(index){

    audio.src = playlist[index];

    fadeInAudio(audio,3000);

}

document.addEventListener("click",()=>{

    if(!sessionStorage.getItem("musicPlayed")){

        sessionStorage.setItem("musicPlayed","true");

        playSong(current);

    }

},{once:true});

audio.addEventListener("ended",()=>{

    current++;

    if(current < playlist.length){

        playSong(current);

    }

});

/* =========================================
   BUTTON SOUNDS
========================================= */

document.querySelectorAll(".soundLink").forEach(link=>{

    link.addEventListener("click", function(e){

        e.preventDefault();

        const sound =
        document.getElementById("sound");

        sound.currentTime = 0;

        sound.play().then(()=>{

            setTimeout(()=>{

                window.location.href =
                link.href;

            },300);

        });

    });

});

document.querySelectorAll(".soundLink1").forEach(link=>{

    link.addEventListener("click", function(e){

        e.preventDefault();

        const sound =
        document.getElementById("sound1");

        sound.currentTime = 0;

        sound.play().then(()=>{

            setTimeout(()=>{

                window.location.href =
                link.href;

            },300);

        });

    });

});

</script>

</body>
</html>
