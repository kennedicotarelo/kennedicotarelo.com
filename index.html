<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kennedi [home]</title>
<link rel="icon" type="image/x-icon" href="images/tablogo.ico">

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Tahoma, Arial, sans-serif;
    cursor:url("images/cursor.webp") 32 32, auto;
}


.enter-screen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
}

.box{
    width:360px;
    background:#4c5844;
    border:1px solid #1e221b;
    padding:16px;
}

.title{
    color:#c68a2d;
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
}

.text{
    color:#d4d7cf;
    font-size:13px;
    margin-bottom:14px;
}

button{
    width:100%;
    padding:8px;
    background:#586450;
    border:1px solid #1e221b;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.screen{
    display:none;
    position:relative;
    width:100%;
    height:100%;
    background:#000 url("images/epistle2.jpg") center/cover no-repeat;
}

.panel{
    position:absolute;
    left:0;
    top:0;
    width:255px;
    height:100%;
    background:#4c5844;
    border-right:1px solid #1e221b;
}

.logo{
    position:absolute;
    left:14px;
    top:18px;
    color:#c68a2d;
    font-size:40px;
    font-weight:bold;
    line-height:34px;
}

.menu{
    position:absolute;
    top:120px;
    width:100%;
}

.item{
    display:block;
    padding:5px 18px;
    color:#d4d7cf;
    font-weight:bold;
    font-size:18px;
    text-decoration:none;
    border-top:1px solid #5f6b57;
    border-bottom:1px solid #31382d;
}

.item:hover{
    background:#5a6652;
    color:#ffb347;
}

.footer{
    position:absolute;
    bottom:6px;
    left:8px;
    font-size:10px;
    color:#111;
    font-weight:bold;
}

.flash{
    position:fixed;
    inset:0;
    background:#7CFF7C;
    opacity:0;
    pointer-events:none;
    z-index:999;
}

.flash.active{
    animation:flash .15s linear;
}

@keyframes flash{
    0%{opacity:0;}
    20%{opacity:0.9;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="enter-screen" id="enter">
    <div class="box">
        <div class="title">kennedicotarelo.com</div>
        <div class="text">//access terminal initialized.</div>
        <button id="btn">get psyched</button>
    </div>
</div>

<div class="flash" id="flash"></div>

<div class="screen" id="screen">
    <div class="panel">
        <div class="logo">kennedi</div>

        <div class="menu">
            <a href="games.html" class="item">new game</a>
            <a href="mods.html" class="item">workshop</a>
            <a href="software.html" class="item">utilities</a>
            <a href="articles.html" class="item">news</a>
            <a href="gallery.html" class="item">extras</a>
            <a href="about.html" class="item">credits</a>
        </div>

        <div class="footer">yes i'm very much bored</div>
    </div>
</div>
<audio id="bgMusic" loop></audio>
<script>
const btn = document.getElementById("btn");
const enter = document.getElementById("enter");
const screen = document.getElementById("screen");
const flash = document.getElementById("flash");

btn.onclick = () => {

    // swap instantly
    screen.style.display = "block";
    enter.style.display = "none";

    // trigger HL flash
    flash.classList.remove("active");
    void flash.offsetWidth; // restart animation
    flash.classList.add("active");
};

const audio =
document.getElementById("bgMusic");

const songs = [

"bgmusic/menuwon.mp3"

];

function shuffle(arr){

    for(let i = arr.length - 1; i > 0; i--){

        const j =
        Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] =
        [arr[j], arr[i]];
    }

    return arr;
}

const playlist =
shuffle([...songs]).slice(0,3);

let current = 0;

function fadeInAudio(audio,duration=3000){

    audio.volume = 0;

    audio.play().catch(()=>{});

    const step = 0.05;
    const interval = duration * step;

    const fade = setInterval(()=>{

        if(audio.volume < 1){

            audio.volume =
            Math.min(audio.volume + step,1);

        }else{

            clearInterval(fade);

        }

    },interval);

}

function playSong(index){

    audio.src = playlist[index];

    fadeInAudio(audio,3000);

}

document.addEventListener("click",()=>{

    if(!sessionStorage.getItem("musicPlayed")){

        sessionStorage.setItem("musicPlayed","true");

        playSong(current);

    }

},{once:true});

audio.addEventListener("ended",()=>{

    current++;

    if(current < playlist.length){

        playSong(current);

    }

});

</script>

</body>
</html>
