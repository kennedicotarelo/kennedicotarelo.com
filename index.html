<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>kennedi [home]</title>
<link rel="icon" type="image/x-icon" href="images/tablogo.ico">

<style>

:root{
    --pink:#ED64F5;
    --purple:#43256E;
    --dark:#13022D;
}

/* ---------------- BODY ---------------- */

body{
    margin:0;
    padding:0;

    background:
    linear-gradient(90deg, rgba(244,182,216,0.25), rgba(216,196,255,0.15)),
    url("");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    font-family: Verdana, sans-serif;
    color:#fceaff;

    overflow:hidden;

    cursor:url("images/cursor.webp") 32 32, auto;
}

/* =========================================
   WELCOME SCREEN
========================================= */

#welcomeScreen{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center,
    rgba(67,37,110,0.55),
    rgba(19,2,45,0.95));

    backdrop-filter:blur(12px);

    z-index:99999;

    perspective:1400px;

    transition:opacity 1s ease;
}

.welcomeBox{

    width:220px;
    max-width:90%;

    text-align:center;

    padding:40px;

    border-radius:24px;

    background:
    rgba(19,2,45,0.55);

    border:
    1px solid rgba(237,100,245,0.35);

    box-shadow:
    0 0 40px rgba(237,100,245,0.25);

    backdrop-filter:blur(12px);

    color:white;

    transform-style:preserve-3d;

    animation:welcomeIdle 3s ease-in-out infinite;
}

.welcomeBox h1{
    margin:0 0 15px;

    font-size:42px;

    text-shadow:
    0 0 20px rgba(237,100,245,0.8);
}

.welcomeBox p{
    color:#d7bfff;
    margin-bottom:30px;
}

#enterBtn{

    border:none;

    padding:14px 30px;

    border-radius:14px;

    font-size:15px;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(135deg,#ED64F5,#7c4dff);

    transition:.25s;
}

#enterBtn:hover{

    transform:
    translateY(-1px)
    scale(1.04);

    box-shadow:
    0 0 25px rgba(237,100,245,0.45);
}

/* FLOAT */

@keyframes welcomeIdle{

    0%{
        transform:
        rotateX(0deg)
        rotateY(0deg)
        translateY(0px);
    }

    50%{
        transform:
        rotateX(2deg)
        rotateY(-2deg)
        translateY(-10px);
    }

    100%{
        transform:
        rotateX(0deg)
        rotateY(0deg)
        translateY(0px);
    }

}

/* ENTER EFFECT */

.welcomeExit{

    animation:
    zoomForward 1.2s cubic-bezier(.2,.8,.2,1)
    forwards !important;
}

@keyframes zoomForward{

    0%{

        opacity:1;

        transform:
        translateZ(0px)
        scale(1);

        filter:blur(0px);
    }

    100%{

        opacity:0;

        transform:
        translateZ(1200px)
        scale(2.6);

        filter:blur(12px);
    }

}

.welcomeFade{
    opacity:0;
    pointer-events:none;
}

/* ---------------- CONTAINER ---------------- */

.container{
    width:900px;
    max-width:95%;
    margin:auto;

    background:rgba(19,2,45,0.45);

    border:2px solid rgba(237,100,245,0.4);

    box-shadow:
    0 0 30px rgba(237,100,245,0.25);

    backdrop-filter:blur(8px);
    border-radius:18px;

    overflow:hidden;

    opacity:0;

    transform:
    scale(.96)
    translateY(20px);

    transition:
    1.2s ease;
}

/* ---------------- TOPBAR ---------------- */

.topbar{
    background:rgba(19,2,45,0.7);
    padding:10px 15px;
    font-size:13px;
    border-bottom:1px solid rgba(237,100,245,0.25);
}

/* ---------------- HEADER ---------------- */

.header{
    text-align:center;
    padding:35px 20px;

    background:
    linear-gradient(
    to right,
    rgba(67,37,110,0.6),
    rgba(237,100,245,0.25)
    );
    padding:15px 10px;
    border-bottom:1px solid rgba(237,100,245,0.3);
}

.header h1{
    user-select: none;
    margin:0;
    font-size:42px;
    color:#fff;

    text-shadow:
    0 0 12px rgba(237,100,245,0.7);

    transition:0.25s ease;
    font-size:30px;
    cursor:pointer;
}

.header h1:hover{
    transform:scale(1.05);
}

.status{
    margin-top:8px;
    font-size:13px;
    color:#d7bfff;
}

/* ---------------- FLEX LAYOUT ---------------- */

.content{
    display:flex;
}

.sidebar{
    width:200px;

    background:rgba(19,2,45,0.45);

    padding:20px;

    border-right:1px solid rgba(237,100,245,0.2);
}

.sidebar h3{
    color:#ED64F5;
    margin-top:0;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar li{
    margin:12px 0;
}

.sidebar a{
    display:block;

    text-decoration:none;
    color:#fff;

    padding:10px 14px;

    border-radius:10px;

    transition:0.25s;
}

.sidebar a:hover{
    background:#43256E;

    transform:scale(1.04);

    text-shadow:
    0 0 12px rgba(255,255,255,0.7);
}

a:hover{
    color:#fff;

    text-shadow:
    0 0 6px #ED64F5,
    0 0 12px #ED64F5,
    0 0 20px rgba(237,100,245,0.8);
}

/* ---------------- MAIN ---------------- */

main{
    flex:1;
    padding:25px;

    background:
    rgba(67,37,110,0.35);
}

/* ---------------- BOX ---------------- */

.box{
    text-align:center;

    background:rgba(255,243,250,0.12);

    border:1px solid rgba(237,100,245,0.4);

    padding:18px;

    margin-bottom:20px;

    border-radius:14px;

    backdrop-filter:blur(6px);
}

/* ---------------- LINKS ---------------- */

.lr-link{
    position:relative;
    color:#fff;
    text-decoration:none;
    font-size:14px;
}

.lr-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:1px;
    background:rgba(199,92,255,0.9);
    transition:width 0.4s ease;
}

.lr-link:hover::after{
    width:100%;
}

/* ---------------- TOOLTIP ---------------- */

.tooltip-link{
    position:relative;
    color:#ff6fb0;
}

.tooltip-text{
    visibility:hidden;
    opacity:0;

    transition:0.4s;

    position:absolute;

    bottom:125%;
    left:50%;

    transform:translateX(-50%);

    background:#43256E;

    color:#fceaff;

    padding:6px 10px;

    border-radius:6px;

    font-size:12px;

    white-space:nowrap;
}

.tooltip-link:hover .tooltip-text{
    visibility:visible;
    opacity:1;
}

/* ---------------- IMAGE ---------------- */

.center-img{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

.center-img img{
    width:500px;
    max-width:100%;

    border-radius:14px;

    opacity:0.9;

    box-shadow:
    0 0 24px rgba(237,100,245,0.35);
}

/* ---------------- MOBILE ---------------- */

@media(max-width:800px){

    body{
        overflow:auto;
    }

    .content{
        flex-direction:column;
    }

    .sidebar{
        width:auto;
        border-right:none;
        border-bottom:1px solid rgba(237,100,245,0.2);
    }

}

/* ---------------- 3D TEXT ---------------- */

.scene{
    perspective:800px;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100px;
}

.real3d{
    font-size:28px;
    font-weight:bold;
    color:#ff6fb0;

    transform-style:preserve-3d;

    transition:transform 0.15s ease;

    text-shadow:
    0 1px 0 #d94a93,
    0 2px 0 #b83b7a,
    0 3px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<!-- =========================================
     WELCOME SCREEN
========================================= -->

<div id="welcomeScreen">

    <div class="welcomeBox" id="enterBox">

        <p>
            kennedicotarelo.com
        </p>

        <button id="enterBtn">
            get psyched!
        </button>

    </div>

</div>

<!-- =========================================
     WEBSITE
========================================= -->

<div class="container">

    <div class="topbar">
        home
    </div>

    <div class="header">
        <h1>♡ kennedi ♡</h1>
    </div>

    <div class="content">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <ul>
                <li><a href="home.html">home</a></li>
                <li><a href="games.html">games</a></li>
                <li><a href="mods.html">mods</a></li>
                <li><a href="software.html">software</a></li>
                <li><a href="articles.html">articles</a></li>
                <li><a href="gallery.html">gallery</a></li>
                <li><a href="about.html">about</a></li>
            </ul>

        </aside>

        <!-- MAIN -->

        <main>

            <div class="box">

		welcome

            </div>

            <div class="box">

                <br><br><br><br>

                <div class="scene">
                    <div class="real3d">
                        ♡ my personal website ♡
                    </div>
                </div>

                <br><br><br><br><br>

            </div>

        </main>

    </div>

</div>

<!-- AUDIO -->

<audio id="bgMusic" loop></audio>

<audio id="sound" src="buttonsound/bloodlines.mp3"></audio>
<audio id="sound1" src="buttonsound/hill.mp3"></audio>

<script>

/* =========================================
   WELCOME SCREEN
========================================= */

const welcomeScreen =
document.getElementById("welcomeScreen");

const enterBox =
document.getElementById("enterBox");

const enterBtn =
document.getElementById("enterBtn");

const container =
document.querySelector(".container");

enterBtn.addEventListener("click",()=>{

    /* optional sound */

    const sound =
    document.getElementById("sound");

    if(sound){

        sound.volume = 0.7;

        sound.currentTime = 0;

        sound.play().catch(()=>{});

    }

    /* animate box */

    enterBox.classList.add("welcomeExit");

    setTimeout(()=>{

        welcomeScreen.classList.add("welcomeFade");

        /* reveal website */

        container.style.opacity = "1";

        container.style.transform =
        "scale(1) translateY(0px)";

    },850);

    setTimeout(()=>{

        welcomeScreen.remove();

    },1800);

});

/* 3D TEXT */

const el = document.querySelector(".real3d");
const scene = document.querySelector(".scene");

scene.addEventListener("mousemove", (e) => {

    const rect = scene.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = ((y - centerY) / centerY) * -20;
    const rotateY = ((x - centerX) / centerX) * 20;

    el.style.transform =
        `rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        translateZ(20px)`;
});

scene.addEventListener("mouseleave", () => {

    el.style.transform =
    "rotateX(0deg) rotateY(0deg)";

});

/* BG MUSIC */

const audio = document.getElementById("bgMusic");

const songs = [
"bgmusic/bgmusic_smiths.mp3",
"bgmusic/bgmusic_parttime.mp3",
"bgmusic/bgmusic_swamped.mp3"
];

function shuffle(arr) {

  for (let i = arr.length - 1; i > 0; i--) {

    const j =
    Math.floor(Math.random() * (i + 1));

    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  return arr;
}

const playlist =
shuffle([...songs]).slice(0, 3);

let current = 0;

function fadeInAudio(audio, duration = 3000) {

  audio.volume = 0;

  audio.play().catch(err =>
  console.log("Play blocked:", err));

  const step = 0.05;
  const interval = duration * step;

  const fade = setInterval(() => {

    if (audio.volume < 1) {

      audio.volume =
      Math.min(audio.volume + step, 1);

    } else {

      clearInterval(fade);

    }

  }, interval);
}

function playSong(index) {

  audio.src = playlist[index];

  fadeInAudio(audio, 3000);
}

document.addEventListener("click", () => {

  if (!sessionStorage.getItem("musicPlayed")) {

    sessionStorage.setItem("musicPlayed", "true");

    playSong(current);
  }

}, { once: true });

audio.addEventListener("ended", () => {

  current++;

  if (current < playlist.length) {

    playSong(current);
  }

});

/* RANDOM BACKGROUND */

const gifs = [
"images/bg1.gif",
"images/bg2.gif"
];

let gif =
sessionStorage.getItem("bgGif");

if (!gif) {

  gif =
  gifs[Math.floor(Math.random() * gifs.length)];

  sessionStorage.setItem("bgGif", gif);
}

document.body.style.backgroundImage =
`url('${gif}')`;

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";

/* BUTTON SOUND */

document.querySelectorAll(".soundLink").forEach(link=>{

    link.addEventListener("click", function(e){

        e.preventDefault();

        const sound =
        document.getElementById("sound");

        sound.currentTime = 0;

        sound.play().then(()=>{

            setTimeout(()=>{

                window.location.href =
                link.href;

            },300);

        });

    });

});

document.querySelectorAll(".soundLink1").forEach(link=>{

    link.addEventListener("click", function(e){

        e.preventDefault();

        const sound =
        document.getElementById("sound1");

        sound.currentTime = 0;

        sound.play().then(()=>{

            setTimeout(()=>{

                window.location.href =
                link.href;

            },300);

        });

    });

});

/* HEADER MOODS */

const title =
document.querySelector(".header h1");

const moods = [
["♡ kennedi m cotarelo ♡"],
["♡ kennedicotarelo.com ♡"]
];

let moodIndex = 0;

title.addEventListener("click",()=>{

    moodIndex =
    (moodIndex + 1) % moods.length;

    title.textContent =
    moods[moodIndex][0];

});

</script>

</body>
</html>
