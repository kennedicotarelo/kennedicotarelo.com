<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>kennedi [home]</title>
<link rel="icon" type="image/x-icon" href="images/tablogo.ico">

<style>

:root{
    --pink:#ED64F5;
    --purple:#43256E;
    --dark:#13022D;
}

/* ---------------- BODY ---------------- */

body{
    margin:0;
    padding:0;

    background:
    linear-gradient(90deg, rgba(244,182,216,0.25), rgba(216,196,255,0.15)),
    url("");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    font-family: Verdana, sans-serif;
    color:#fceaff;

    cursor:url("images/cursor.webp") 32 32, auto;
}

/* ---------------- CONTAINER ---------------- */

.container{
    width:900px;
    max-width:95%;
    margin:auto;

    background:rgba(19,2,45,0.45);

    border:2px solid rgba(237,100,245,0.4);

    box-shadow:
    0 0 30px rgba(237,100,245,0.25);

    backdrop-filter:blur(8px);
    border-radius:18px;

    overflow:hidden;
}

/* ---------------- TOPBAR ---------------- */

.topbar{
    background:rgba(19,2,45,0.7);
    padding:10px 15px;
    font-size:13px;
    border-bottom:1px solid rgba(237,100,245,0.25);
}

/* ---------------- HEADER ---------------- */

.header{
    text-align:center;
    padding:35px 20px;

    background:
    linear-gradient(
    to right,
    rgba(67,37,110,0.6),
    rgba(237,100,245,0.25)
    );
    padding:15px 10px;
    border-bottom:1px solid rgba(237,100,245,0.3);
}

.header h1{
    user-select: none;
    margin:0;
    font-size:42px;
    color:#fff;

    text-shadow:
    0 0 12px rgba(237,100,245,0.7);

    transition:0.25s ease;
    font-size:30px;
    cursor:pointer;
}

.header h1:hover{
    transform:scale(1.05);
}

.status{
    margin-top:8px;
    font-size:13px;
    color:#d7bfff;
}

/* ---------------- FLEX LAYOUT ---------------- */

.content{
    display:flex;
}

.sidebar{
    width:200px;

    background:rgba(19,2,45,0.45);

    padding:20px;

    border-right:1px solid rgba(237,100,245,0.2);
}

.sidebar h3{
    color:#ED64F5;
    margin-top:0;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar li{
    margin:12px 0;
}

.sidebar a{
    display:block;

    text-decoration:none;
    color:#fff;

    padding:10px 14px;

    border-radius:10px;

    transition:0.25s;
}

.sidebar a:hover{
    background:#43256E;

    transform:scale(1.04);

    text-shadow:
    0 0 12px rgba(255,255,255,0.7);
}

a:hover{
    color:#fff;

    text-shadow:
    0 0 6px #ED64F5,
    0 0 12px #ED64F5,
    0 0 20px rgba(237,100,245,0.8);
}

/* ---------------- MAIN ---------------- */

main{
    flex:1;
    padding:25px;

    background:
    rgba(67,37,110,0.35);
}

/* ---------------- BOX ---------------- */

.box{
    text-align:center;

    background:rgba(255,243,250,0.12);

    border:1px solid rgba(237,100,245,0.4);

    padding:18px;

    margin-bottom:20px;

    border-radius:14px;

    backdrop-filter:blur(6px);
}

/* ---------------- LINKS ---------------- */

.lr-link{
    position:relative;
    color:#fff;
    text-decoration:none;
    font-size:14px;
}

.lr-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:1px;
    background:rgba(199,92,255,0.9);
    transition:width 0.4s ease;
}

.lr-link:hover::after{
    width:100%;
}

/* ---------------- TOOLTIP ---------------- */

.tooltip-link{
    position:relative;
    color:#ff6fb0;
}

.tooltip-text{
    visibility:hidden;
    opacity:0;

    transition:0.4s;

    position:absolute;

    bottom:125%;
    left:50%;

    transform:translateX(-50%);

     background: #43256E;

    color: #fceaff;

    padding:6px 10px;

    border-radius:6px;

    font-size:12px;

    white-space:nowrap;
}

.tooltip-link:hover .tooltip-text{
    visibility:visible;
    opacity:1;
}

/* ---------------- IMAGE ---------------- */

.center-img{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

.center-img img{
    width:500px;
    max-width:100%;

    border-radius:14px;

    opacity:0.9;

    box-shadow:
    0 0 24px rgba(237,100,245,0.35);
}


/* ---------------- MOBILE ---------------- */

@media(max-width:800px){

    .content{
        flex-direction:column;
    }

    .sidebar{
        width:auto;
        border-right:none;
        border-bottom:1px solid rgba(237,100,245,0.2);
    }

}

/* ---------------- 3D TEXT ---------------- */

.scene{
    perspective:800px;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100px;
}

.real3d{
    font-size:28px;
    font-weight:bold;
    color:#ff6fb0;

    transform-style:preserve-3d;

    transition:transform 0.15s ease;

    text-shadow:
    0 1px 0 #d94a93,
    0 2px 0 #b83b7a,
    0 3px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        home
    </div>

    <div class="header">
        <h1>♡ kennedi ♡</h1>
    </div>

    <div class="content">

        <!-- SIDEBAR -->

        <aside class="sidebar">


            <ul>
                <li><a href="home.html">home</a></li>
                <li><a href="games.html">games</a></li>
                <li><a href="mods.html">mods</a></li>
                <li><a href="software.html">software</a></li>
                <li><a href="articles.html">articles</a></li>
                <li><a href="gallery.html">gallery</a></li>
                <li><a href="about.html">about</a></li>
            </ul>

        </aside>

        <!-- MAIN -->

        <main>

            <div class="box">

		welcome

            </div>

            <div class="box">
<br><br><br><br>
<div class="scene">
  <div class="real3d">♡ my personal website ♡</div>
</div>
                <br><br><br><br><br>
            </div>

        </main>

    </div>

</div>


<script>

/* 3D TEXT */

const el = document.querySelector(".real3d");
const scene = document.querySelector(".scene");

scene.addEventListener("mousemove", (e) => {

    const rect = scene.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = ((y - centerY) / centerY) * -20;
    const rotateY = ((x - centerX) / centerX) * 20;

    el.style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(20px)`;
});

scene.addEventListener("mouseleave", () => {
    el.style.transform = "rotateX(0deg) rotateY(0deg)";
});


/* RANDOM BACKGROUND */

const gifs = ["images/backgrouund.gif"];

let gif = sessionStorage.getItem("bgGif");

if (!gif) {
  gif = gifs[Math.floor(Math.random() * gifs.length)];
  sessionStorage.setItem("bgGif", gif);
}

document.body.style.backgroundImage = `url('${gif}')`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";


/* HEADER MOODS */

const title=document.querySelector(".header h1");
const status=document.querySelector(".status");

const moods=[
["♡ kennedi m cotarelo ♡"],
["♡ kennedicotarelo.com ♡"]
];

let moodIndex=0;

title.addEventListener("click",()=>{

    moodIndex=(moodIndex+1)%moods.length;

    title.textContent=moods[moodIndex][0];

    status.textContent=moods[moodIndex][1];

});

</script>

</body>
</html>
